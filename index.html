    .page {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: space-between;
      position: relative;
      z-index: 10;

      /* Portrait default */
      padding: 12px 14px 10px;
    }

    .game-container {
      flex: 1;
      border-radius: 14px;
      overflow: hidden;
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.13);
      min-height: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      padding-top: 8px;
    }

    .products {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .products img {
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.18));
    }

    .logo-saval img {
      object-fit: contain;
    }

    /* ── PORTRAIT (vertical) ── */
    @media screen and (orientation: portrait) {
      .page {
        padding: 10px 12px 8px;
      }
      .products img {
        height: 80px;
      }
      .logo-saval img {
        height: 32px;
      }
      .bottom-bar {
        padding-top: 8px;
      }
    }

    /* ── LANDSCAPE (horizontal) ── */
    @media screen and (orientation: landscape) {
      .page {
        padding: 14px 18px 12px;
      }
      .products img {
        height: 110px;
      }
      .logo-saval img {
        height: 44px;
      }
