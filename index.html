<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Juego Educativo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    h1 { color: white; margin-bottom: 1rem; }
    .game-container {
      width: 90%;
      max-width: 900px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    iframe {
      width: 100%;
      height: 690px;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <h1>🎮 Mi Juego</h1>
  <div class="game-container">
    <iframe
      allow="fullscreen; autoplay; allow-top-navigation-by-user-activation"
      allowfullscreen
      frameborder="0"
      src="https://www.educaplay.com/game/29189993-test_2.html">
    </iframe>
  </div>
</body>
</html>
